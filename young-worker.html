<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDC Young Worker Orientation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f2f5;
        }
        .section-header {
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background-color: #96C61C;
            color: white;
            border-radius: 0.5rem;
            margin-bottom: 0.5rem;
            transition: background-color 0.3s ease;
        }
        .section-header:hover {
            background-color: #7da414;
        }
        .section-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease-out;
            background-color: #ffffff;
            border-radius: 0.5rem;
            padding: 0 1.5rem;
            margin-bottom: 1rem;
        }
        .section-content.active {
            max-height: 5000px;
            padding: 1.5rem;
        }
        .arrow {
            transition: transform 0.3s ease;
            color: #003D52;
        }
        .arrow.rotate {
            transform: rotate(90deg);
        }
        .sub-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: #1f2937;
            margin-top: 1.25rem;
            margin-bottom: 0.5rem;
            border-left: 4px solid #96C61C;
            padding-left: 0.6rem;
        }
        .sub-title:first-child {
            margin-top: 0;
        }
        .message-box {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2100;
            padding: 1rem 2rem;
            border-radius: 0.5rem;
            text-align: center;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            min-width: 300px;
            max-width: 90%;
            transition: top 0.5s ease-out;
        }
        .message-box.hidden {
            top: -100px;
        }
        .message-box.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="message" class="message-box hidden"></div>

    <div class="max-w-4xl mx-auto bg-white shadow-lg rounded-lg p-6 md:p-10">
        <header class="text-center mb-8">
            <div class="flex justify-end mb-4">
                 <select id="language-selector" class="p-2 border rounded-md shadow-sm">
                    <option value="en">English</option>
                    <option value="es">Español</option>
                </select>
            </div>
            <h1 id="main-title" class="text-4xl font-bold text-gray-800 mb-2"></h1>
            <p id="welcome-message" class="text-lg text-gray-600 mt-4"></p>
        </header>

        <!-- 1. Rights, duties & supervision -->
        <section class="mb-8">
            <div class="section-header" onclick="toggleSection('group1-content')">
                <h2 id="group1-header" class="text-2xl font-semibold"></h2>
                <span class="arrow text-3xl">&#9658;</span>
            </div>
            <div id="group1-content" class="section-content" data-viewed="false">
                <h3 id="supervisor-header" class="sub-title"></h3>
                <p id="supervisor-text" class="text-gray-700"></p>
                <h3 id="duties-header" class="sub-title"></h3>
                <ul class="list-disc pl-5 text-gray-700 space-y-2">
                    <li id="duty-employer"></li>
                    <li id="duty-supervisor"></li>
                    <li id="duty-worker"></li>
                </ul>
                <h3 id="procedures-header" class="sub-title"></h3>
                <p id="procedures-text" class="text-gray-700"></p>
            </div>
        </section>

        <!-- 2. Working alone & personal safety -->
        <section class="mb-8">
            <div class="section-header" onclick="toggleSection('group2-content')">
                <h2 id="group2-header" class="text-2xl font-semibold"></h2>
                <span class="arrow text-3xl">&#9658;</span>
            </div>
            <div id="group2-content" class="section-content" data-viewed="false">
                <h3 id="alone-header" class="sub-title"></h3>
                <p id="alone-text" class="text-gray-700"></p>
                <h3 id="violence-header" class="sub-title"></h3>
                <p id="violence-text" class="text-gray-700"></p>
                <h3 id="harassment-header" class="sub-title"></h3>
                <p id="harassment-text" class="text-gray-700"></p>
            </div>
        </section>

        <!-- 3. Emergencies & hazardous materials -->
        <section class="mb-8">
            <div class="section-header" onclick="toggleSection('group3-content')">
                <h2 id="group3-header" class="text-2xl font-semibold"></h2>
                <span class="arrow text-3xl">&#9658;</span>
            </div>
            <div id="group3-content" class="section-content" data-viewed="false">
                <h3 id="emergency-header" class="sub-title"></h3>
                <ul class="list-disc pl-5 text-gray-700 space-y-2">
                    <li id="emergency-eyewash"></li>
                    <li id="emergency-exits"></li>
                    <li id="emergency-extinguisher"></li>
                </ul>
                <h3 id="whmis-header" class="sub-title"></h3>
                <ul class="list-disc pl-5 text-gray-700 space-y-2">
                    <li id="whmis-labels"></li>
                    <li id="whmis-handling"></li>
                    <li id="whmis-spills"></li>
                </ul>
            </div>
        </section>

        <!-- 4. Safety program & contacts -->
        <section class="mb-8">
            <div class="section-header" onclick="toggleSection('group4-content')">
                <h2 id="group4-header" class="text-2xl font-semibold"></h2>
                <span class="arrow text-3xl">&#9658;</span>
            </div>
            <div id="group4-content" class="section-content" data-viewed="false">
                <h3 id="program-header" class="sub-title"></h3>
                <p id="program-text" class="text-gray-700"></p>
                <h3 id="rep-header" class="sub-title"></h3>
                <p id="rep-text" class="text-gray-700"></p>
            </div>
        </section>

        <footer class="text-center mt-10">
            <a href="#" id="register-btn" target="_blank" rel="noopener noreferrer" class="inline-block text-white font-bold py-3 px-6 rounded-lg text-lg" style="background-color:#003D52" onmouseover="this.style.backgroundColor='#00293a'" onmouseout="this.style.backgroundColor='#003D52'"></a>
            <p id="register-note" class="text-gray-500 text-sm mt-3"></p>
        </footer>
    </div>

    <script>
        const REGISTRATION_FORM_URL = "https://forms.gle/i9MmVPU1uPnTtpmY6";

        let currentLang = 'en';

        const translations = {
            en: {
                mainTitle: "Young Worker Orientation",
                welcomeMessage: "This supplement is required if you are 25 years old or younger, OR new to construction / new to this site. Review every section, then register at the end.",
                group1Header: "Rights, Duties & Supervision",
                group2Header: "Working Alone & Personal Safety",
                group3Header: "Emergencies & Hazardous Materials",
                group4Header: "Safety Program & Contacts",
                supervisorHeader: "Know Your Supervisor",
                supervisorText: "Before starting work, make sure you know <strong>who your direct supervisor (foreman) is and how to reach them</strong>. Your supervisor is your first contact for questions, hazards, and emergencies. If you don't know who your supervisor is, ask before you start working.",
                dutiesHeader: "Who Is Responsible for Your Safety",
                dutyEmployer: "<strong>Your employer</strong> must provide a safe workplace, training, supervision, and instruction on the PPE you need.",
                dutySupervisor: "<strong>Your supervisor</strong> must ensure your safety, make sure you know the hazards of your tasks, and never assign you work you are not trained for.",
                dutyWorker: "<strong>You</strong> must follow procedures and speak up — it's OK to ask questions. If you're unsure how to do a task safely, <strong>STOP and ask</strong>.",
                proceduresHeader: "Safe Work Procedures for YOUR Tasks",
                proceduresText: "Your employer or supervisor must show you the safe work procedure for each task <strong>before you do it for the first time</strong>. Never operate tools or equipment you haven't been trained on. If a task feels wrong or different from how you were trained, stop and check with your supervisor.",
                aloneHeader: "Working Alone or in Isolation",
                aloneText: "Working alone should be avoided whenever possible. If your foreman assigns you to work alone, <strong>your trade's foreman is responsible for checking on your well-being periodically</strong> during the task. If you are working alone and feel unsafe or need help, contact your foreman or the CSO (Bethzy – 604 906 0247). Make sure your foreman always knows where you are working.",
                violenceHeader: "If You Face Violence or Threats",
                violenceText: "Remove yourself from the situation and get to a safe location. Do not confront the person. Report it immediately to the CSO (Bethzy – 604 906 0247). <strong>Call 911 if there is immediate danger.</strong>",
                harassmentHeader: "Harassment Complaints — Follow-up",
                harassmentText: "All reports of bullying, harassment, or violence are investigated by the <strong>CSO (Bethzy Hernandez)</strong> promptly and confidentially.",
                emergencyHeader: "Emergency Information",
                emergencyEyewash: "<strong>Eye wash:</strong> If you get anything in your eyes, go to the <strong>First Aid room in the WDC site trailer</strong>.",
                emergencyExits: "<strong>Emergency exits:</strong> Always know the nearest exit route from your work area. When the evacuation alarm sounds (1 long, continuous blast), go to the muster point in front of the site office.",
                emergencyExtinguisher: "<strong>How to use a fire extinguisher — PASS:</strong> <strong>P</strong>ull the pin, <strong>A</strong>im at the base of the fire, <strong>S</strong>queeze the handle, <strong>S</strong>weep side to side. Only fight small fires. If in doubt, evacuate and raise the alarm.",
                whmisHeader: "Hazardous Materials (WHMIS) Basics",
                whmisLabels: "<strong>Labels:</strong> Every hazardous product has a supplier label with hazard pictograms — read it before use. <strong>Never use a product from an unlabeled container.</strong>",
                whmisHandling: "<strong>Handling, storage & disposal:</strong> Follow the instructions on the label and the Safety Data Sheet (SDS). Return products to their storage location. Never pour chemicals into drains or regular garbage.",
                whmisSpills: "<strong>Spills:</strong> Stop work, keep people away, and report immediately to your supervisor and the CSO. Do not clean up a chemical spill unless you are trained to do so.",
                programHeader: "WDC Health & Safety Program",
                programText: "WDC has a written Occupational Health and Safety Program that includes safe work procedures, hazard assessments, inspections, incident reporting, and training records. You can consult it in the <strong>First Aid room in the WDC site trailer</strong>.",
                repHeader: "Worker Safety Representative",
                repText: "The Worker Health and Safety Representative for this site is <strong>Dan McGuire – 604 938 4354</strong>. You can talk to him about any safety concern, in addition to your supervisor and the CSO.",
                registerBtn: "Go to Registration Form",
                registerNote: "You must open every section above before registering.",
                messages: {
                    reviewAll: "Please review all sections before registering."
                }
            },
            es: {
                mainTitle: "Orientación para Trabajadores Jóvenes",
                welcomeMessage: "Este suplemento es obligatorio si usted tiene 25 años o menos, O es nuevo en la construcción / nuevo en este sitio. Revise cada sección y regístrese al final.",
                group1Header: "Derechos, Deberes y Supervisión",
                group2Header: "Trabajar Solo y Seguridad Personal",
                group3Header: "Emergencias y Materiales Peligrosos",
                group4Header: "Programa de Seguridad y Contactos",
                supervisorHeader: "Conozca a su Supervisor",
                supervisorText: "Antes de comenzar a trabajar, asegúrese de saber <strong>quién es su supervisor directo (foreman) y cómo contactarlo</strong>. Su supervisor es su primer contacto para preguntas, peligros y emergencias. Si no sabe quién es su supervisor, pregunte antes de empezar a trabajar.",
                dutiesHeader: "Quién es Responsable de su Seguridad",
                dutyEmployer: "<strong>Su empleador</strong> debe proporcionar un lugar de trabajo seguro, capacitación, supervisión e instrucción sobre el EPP que necesita.",
                dutySupervisor: "<strong>Su supervisor</strong> debe garantizar su seguridad, asegurarse de que conozca los peligros de sus tareas y nunca asignarle trabajo para el que no está capacitado.",
                dutyWorker: "<strong>Usted</strong> debe seguir los procedimientos y hablar — está bien hacer preguntas. Si no está seguro de cómo hacer una tarea con seguridad, <strong>DETÉNGASE y pregunte</strong>.",
                proceduresHeader: "Procedimientos de Trabajo Seguro para SUS Tareas",
                proceduresText: "Su empleador o supervisor debe mostrarle el procedimiento de trabajo seguro de cada tarea <strong>antes de hacerla por primera vez</strong>. Nunca opere herramientas o equipos para los que no ha sido capacitado. Si una tarea se siente mal o diferente a como le enseñaron, deténgase y consulte con su supervisor.",
                aloneHeader: "Trabajar Solo o Aislado",
                aloneText: "Se debe evitar trabajar solo siempre que sea posible. Si su foreman le asigna trabajar solo, <strong>el foreman de su trade es responsable de verificar su bienestar periódicamente</strong> durante la tarea. Si trabaja solo y se siente inseguro o necesita ayuda, contacte a su foreman o a la CSO (Bethzy – 604 906 0247). Asegúrese de que su foreman siempre sepa dónde está trabajando.",
                violenceHeader: "Si Enfrenta Violencia o Amenazas",
                violenceText: "Aléjese de la situación y vaya a un lugar seguro. No confronte a la persona. Repórtelo de inmediato a la CSO (Bethzy – 604 906 0247). <strong>Llame al 911 si hay peligro inmediato.</strong>",
                harassmentHeader: "Quejas de Acoso — Seguimiento",
                harassmentText: "Todos los reportes de intimidación, acoso o violencia son investigados por la <strong>CSO (Bethzy Hernandez)</strong> de manera pronta y confidencial.",
                emergencyHeader: "Información de Emergencia",
                emergencyEyewash: "<strong>Lavaojos:</strong> Si le entra algo en los ojos, acuda al <strong>cuarto de Primeros Auxilios en el tráiler del sitio de WDC</strong>.",
                emergencyExits: "<strong>Salidas de emergencia:</strong> Siempre conozca la ruta de salida más cercana desde su área de trabajo. Cuando suene la alarma de evacuación (1 toque largo y continuo), vaya al punto de reunión frente a la oficina del sitio.",
                emergencyExtinguisher: "<strong>Cómo usar un extintor — PASS:</strong> <strong>P</strong>: jale el pasador, <strong>A</strong>: apunte a la base del fuego, <strong>S</strong>: apriete la manija, <strong>S</strong>: barra de lado a lado. Solo combata fuegos pequeños. Si tiene dudas, evacúe y dé la alarma.",
                whmisHeader: "Materiales Peligrosos (WHMIS) — Básicos",
                whmisLabels: "<strong>Etiquetas:</strong> Todo producto peligroso tiene una etiqueta del proveedor con pictogramas de peligro — léala antes de usarlo. <strong>Nunca use un producto de un envase sin etiqueta.</strong>",
                whmisHandling: "<strong>Manejo, almacenamiento y desecho:</strong> Siga las instrucciones de la etiqueta y de la Hoja de Datos de Seguridad (SDS). Regrese los productos a su lugar de almacenamiento. Nunca vierta químicos en drenajes ni en la basura común.",
                whmisSpills: "<strong>Derrames:</strong> Detenga el trabajo, mantenga a la gente alejada y repórtelo de inmediato a su supervisor y a la CSO. No limpie un derrame químico a menos que esté capacitado para hacerlo.",
                programHeader: "Programa de Salud y Seguridad de WDC",
                programText: "WDC tiene un Programa escrito de Salud y Seguridad Ocupacional que incluye procedimientos de trabajo seguro, evaluaciones de peligros, inspecciones, reporte de incidentes y registros de capacitación. Puede consultarlo en el <strong>cuarto de Primeros Auxilios en el tráiler del sitio de WDC</strong>.",
                repHeader: "Representante de Seguridad de los Trabajadores",
                repText: "El Representante de Salud y Seguridad de los Trabajadores de este sitio es <strong>Dan McGuire – 604 938 4354</strong>. Puede hablar con él sobre cualquier preocupación de seguridad, además de su supervisor y la CSO.",
                registerBtn: "Ir al Formulario de Registro",
                registerNote: "Debe abrir todas las secciones antes de registrarse.",
                messages: {
                    reviewAll: "Por favor revise todas las secciones antes de registrarse."
                }
            }
        };

        const sectionOrder = ['group1-content','group2-content','group3-content','group4-content'];

        function toggleSection(id) {
            const content = document.getElementById(id);
            const header = content.previousElementSibling;
            const arrow = header.querySelector('.arrow');
            content.classList.toggle('active');
            arrow.classList.toggle('rotate');
            if (content.classList.contains('active')) {
                content.dataset.viewed = 'true';
            }
        }

        function showMessage(key, type) {
            const t = translations[currentLang] || translations.en;
            const box = document.getElementById('message');
            box.textContent = t.messages[key];
            box.className = 'message-box ' + type;
            setTimeout(() => box.classList.add('hidden'), 3500);
        }

        function applyTranslations() {
            const t = translations[currentLang] || translations.en;
            const set = (id, key, html = true) => {
                const el = document.getElementById(id);
                if (el) { html ? el.innerHTML = t[key] : el.textContent = t[key]; }
            };
            set('main-title', 'mainTitle', false);
            set('welcome-message', 'welcomeMessage', false);
            set('group1-header', 'group1Header', false);
            set('group2-header', 'group2Header', false);
            set('group3-header', 'group3Header', false);
            set('group4-header', 'group4Header', false);
            set('supervisor-header', 'supervisorHeader', false);
            set('supervisor-text', 'supervisorText');
            set('duties-header', 'dutiesHeader', false);
            set('duty-employer', 'dutyEmployer');
            set('duty-supervisor', 'dutySupervisor');
            set('duty-worker', 'dutyWorker');
            set('procedures-header', 'proceduresHeader', false);
            set('procedures-text', 'proceduresText');
            set('alone-header', 'aloneHeader', false);
            set('alone-text', 'aloneText');
            set('violence-header', 'violenceHeader', false);
            set('violence-text', 'violenceText');
            set('harassment-header', 'harassmentHeader', false);
            set('harassment-text', 'harassmentText');
            set('emergency-header', 'emergencyHeader', false);
            set('emergency-eyewash', 'emergencyEyewash');
            set('emergency-exits', 'emergencyExits');
            set('emergency-extinguisher', 'emergencyExtinguisher');
            set('whmis-header', 'whmisHeader', false);
            set('whmis-labels', 'whmisLabels');
            set('whmis-handling', 'whmisHandling');
            set('whmis-spills', 'whmisSpills');
            set('program-header', 'programHeader', false);
            set('program-text', 'programText');
            set('rep-header', 'repHeader', false);
            set('rep-text', 'repText');
            set('register-btn', 'registerBtn', false);
            set('register-note', 'registerNote', false);
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('language-selector').addEventListener('change', (e) => {
                currentLang = e.target.value;
                applyTranslations();
            });

            const registerBtn = document.getElementById('register-btn');
            registerBtn.addEventListener('click', (e) => {
                if (!sectionOrder.every(id => document.getElementById(id).dataset.viewed === 'true')) {
                    e.preventDefault();
                    showMessage('reviewAll', 'error');
                    return;
                }
                registerBtn.href = REGISTRATION_FORM_URL;
            });

            applyTranslations();
        });
    </script>
</body>
</html>
